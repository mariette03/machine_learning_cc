CUTOFF: 3.7 # TODO change
general:
    progress: logged

# CHANGE THIS (MANDATORY)
model:
    offset: +LearnableOffset() # was macht das hier?
    many-body:
        # SPECIFY ARCHITECTURE e.g. "+NequIP:"
        +MACE:
            elements: [C]
            cutoff: =/CUTOFF # YOU CAN CHANGE THIS AT THE TOP (OPTIONAL)
            # SPECIFY HYPERPARAMETERS (MANDATORY- please read documentation!) TODO
            channels: 64
            layers: 2
            correlation: 3
            l_max: 1
            n_radial: 8

# direct model towards the datafiles we've just made ...
data:
    train:
            path: train.xyz
            n: 1500 # we don't use the full training set here to minimise training time TODO change
            shuffle: true
            cutoff: =/CUTOFF
            seed: 42
    valid: 
            path: valid.xyz
            cutoff: =/CUTOFF
    test: 
            path: test.xyz
            cutoff: =/CUTOFF

# specify loss function
# here we weight energy and forces 1:1 - you can change this! TODO
loss:
    - +PerAtomEnergyLoss()
    - +ForceRMSE()

# specify training protocol
# key parameters here are the learning rate, batch size, and max_epochs- you can experiment with different values!
fitting:
    trainer_kwargs:
        max_epochs: 100 # we keep this small for the purposes of this class, in practice you should let your models train to completion
        accelerator: auto 
        check_val_every_n_epoch: 1

    early_stopping:
        patience: 10

    optimizer:
            name: AdamW
            lr: 0.01 # YOU CAN CHANGE THIS (OPTIONAL)

    scheduler:
            name: ReduceLROnPlateau
            factor: 0.5
            patience: 10

    loader_kwargs:
        batch_size: 16 # YOU CAN CHANGE THIS (OPTIONAL)
        num_workers: 4
        seed: 42

wandb: null
